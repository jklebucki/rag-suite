services:
  embedding-service:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-ipex-latest
    container_name: embedding-service-srv
    restart: unless-stopped
    ports:
      - "8580:80"
    volumes:
      - embedding-srv-data:/data
    environment:
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      TOKENIZERS_PARALLELISM: "false"
    command:
      - --model-id
      - intfloat/multilingual-e5-base
      - --auto-truncate
      - --dtype
      - float32
      - --max-batch-tokens
      - "8192"
      - --max-client-batch-size
      - "32"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  rerank-service:
    image: michaelf34/infinity:latest-cpu
    container_name: rerank-service-srv
    restart: unless-stopped
    ports:
      - "8582:80"
    volumes:
      - rerank-srv-data:/app/.cache
    environment:
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
      TOKENIZERS_PARALLELISM: "false"
    command:
      - v2
      - --model-id
      - BAAI/bge-reranker-v2-m3
      - --engine
      - torch
      - --dtype
      - float32
      - --batch-size
      - "4"
      - --port
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

volumes:
  embedding-srv-data:
  rerank-srv-data: